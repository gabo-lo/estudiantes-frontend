<!-- Contenedor principal con fondo gris claro -->
<div class="min-h-screen bg-slate-50 py-8 px-4 sm:px-6 lg:px-8">
  <div class="max-w-6xl mx-auto">
    
    <!-- Encabezado Principal -->
    <div class="bg-blue-600 text-white rounded-2xl p-6 shadow-lg mb-8 flex items-center justify-between">
      <div>
        <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight">Sistema de Control Escolar</h1>
        <p class="text-blue-100 text-sm mt-1">Panel de Administración de Estudiantes</p>
      </div>
    </div>

    <!-- Distribución en Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
      
      <!-- COLUMNA 1: FORMULARIO -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
          <span class="w-2.5 h-6 rounded-full bg-blue-600"></span>
          {{ editando ? 'Editar Estudiante' : 'Registrar Estudiante' }}
        </h2>

        <form (ngSubmit)="guardar()" class="space-y-5">
          <!-- Campo Matrícula -->
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Matrícula</label>
            <input 
              type="number" 
              name="matricula" 
              [(ngModel)]="estudianteForm.matricula" 
              [disabled]="editando"
              placeholder="Ej. 2022060063"
              class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all duration-200 outline-none"
              [ngClass]="{'bg-slate-50 text-slate-400 border-slate-200 cursor-not-allowed': editando}"
            >
          </div>

          <!-- Campo Nombre Completo -->
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Nombre Completo</label>
            <input 
              type="text" 
              name="nombreCompleto" 
              [(ngModel)]="estudianteForm.nombreCompleto" 
              placeholder="Ingresa el nombre completo"
              class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all duration-200 outline-none"
            >
          </div>

          <!-- Campo Carrera -->
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Carrera</label>
            <input 
              type="text" 
              name="carrera" 
              [(ngModel)]="estudianteForm.carrera" 
              placeholder="Ej. Informática"
              class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all duration-200 outline-none"
            >
          </div>

          <!-- Botones de Acción -->
          <div class="flex flex-col gap-2 pt-2">
            <button 
              type="submit" 
              class="w-full py-3 rounded-xl font-semibold shadow-sm transition-all duration-200 flex items-center justify-center gap-2 cursor-pointer text-white"
              [ngClass]="editando ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-blue-600 hover:bg-blue-700'"
            >
              <svg *ngIf="editando" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" />
              </svg>
              <svg *ngIf="!editando" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
              </svg>
              {{ editando ? 'Guardar Cambios' : 'Registrar Alumno' }}
            </button>

            <button 
              *ngIf="editando"
              type="button" 
              (click)="limpiarFormulario()"
              class="w-full py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-semibold transition-all duration-200"
            >
              Cancelar Edición
            </button>
          </div>
        </form>
      </div>

  
      <div class="lg:col-span-2 space-y-6">
        
        <!-- Barra de Búsqueda -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 flex flex-col sm:flex-row gap-3 items-center">
          <div class="relative w-full">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-400">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
              </svg>
            </span>
            <input 
              type="number" 
              name="matriculaBuscar" 
              [(ngModel)]="matriculaBuscar"
              placeholder="Buscar estudiante por matrícula exacta..." 
              class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-200 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all duration-200"
            >
          </div>
          <div class="flex w-full sm:w-auto gap-2">
            <button 
              (click)="buscarPorMatricula()" 
              class="w-full sm:w-auto px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl shadow-sm transition-all duration-200"
            >
              Buscar
            </button>
            <button 
              *ngIf="filtrado" 
              (click)="restaurarLista()" 
              class="w-full sm:w-auto px-4 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold rounded-xl transition-all duration-200 flex items-center justify-center gap-1"
            >
              Limpiar
            </button>
          </div>
        </div>

        <!-- Tabla -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
          <div class="overflow-x-auto w-full">
            <table class="min-w-full divide-y divide-slate-150">
              <thead class="bg-slate-50">
                <tr>
                  <th scope="col" class="px-6 py-4 text-left text-xs font-extrabold text-slate-100 uppercase tracking-wider bg-blue-600">Matrícula</th>
                  <th scope="col" class="px-6 py-4 text-left text-xs font-extrabold text-slate-100 uppercase tracking-wider bg-blue-600">Nombre Completo</th>
                  <th scope="col" class="px-6 py-4 text-left text-xs font-extrabold text-slate-100 uppercase tracking-wider bg-blue-600">Carrera</th>
                  <th scope="col" class="px-6 py-4 text-center text-xs font-extrabold text-slate-100 uppercase tracking-wider bg-blue-600 text-white">Acciones</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-100 bg-white">
                <tr *ngIf="estudiantes.length === 0">
                  <td colspan="4" class="px-6 py-10 text-center text-slate-400">
                    No se encontraron estudiantes registrados.
                  </td>
                </tr>
                <tr *ngFor="let e of estudiantes" class="hover:bg-slate-50/70 transition-colors duration-150">
                  <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold text-slate-700">
                    {{ e.matricula }}
                  </td>
                  <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600">
                    {{ e.nombreCompleto }}
                  </td>
                  <td class="px-6 py-4 whitespace-nowrap text-sm">
                    <span class="inline-flex items-center px-2.5 py-1.5 rounded-lg text-xs font-medium bg-blue-50 text-blue-700 border border-blue-100">
                      {{ e.carrera }}
                    </span>
                  </td>
                  <td class="px-6 py-4 whitespace-nowrap text-sm text-center">
                    <div class="inline-flex rounded-lg shadow-sm">
                      <button 
                        (click)="seleccionarParaEditar(e)" 
                        class="px-3.5 py-2 bg-white hover:bg-amber-50 border border-slate-200 text-amber-600 hover:text-amber-700 rounded-l-lg text-xs font-semibold transition-all duration-150 flex items-center gap-1"
                      >
                        Editar
                      </button>
                      <button 
                        (click)="eliminar(e.matricula)" 
                        class="px-3.5 py-2 bg-white hover:bg-red-50 border-y border-r border-slate-200 text-red-600 hover:text-red-700 rounded-r-lg text-xs font-semibold transition-all duration-150 flex items-center gap-1"
                      >
                        Eliminar
                      </button>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>

    </div>
  </div>
</div>
